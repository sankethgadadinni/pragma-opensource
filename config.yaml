runtime:
  seed: 0
  device: auto
  deterministic: false
  compile: false
  matmul_precision: high
  log_every: 1
  distributed:
    enabled: false
    backend: nccl
    find_unused_parameters: false
    broadcast_buffers: false
  checkpointing:
    save_every: 5
    keep_last: 2
    resume_path: null

data:
  source: synthetic
  records_json: null
  sharded_store_dir: artifacts/pretrain_store
  num_records: 256
  train_fraction: 0.8
  synthetic_seed: 0
  min_events: 16
  max_events: 72
  mbd:
    root_dir: null
    targets_path: null
    transactions_path: null
    geo_path: null
    dialogs_path: null
    allowed_folds: []
    label_fields: null
    label_mode: auto
    attach_targets: true
    history_window_days: 365
    dialog_embedding_strategy: project
    dialog_projection_dim: 8
    dialog_seed: 0
    max_clients: 0
    max_records: 0
    shuffle_targets: false
    sample_seed: 0
    drop_empty_records: false

tokenizer:
  categorical_threshold: 128
  numeric_bucket_count: 64
  text_vocab_size: 4096
  bpe_min_frequency: 2
  max_event_tokens: 24
  max_profile_tokens: 200
  max_events: 6500
  force_categorical_fields:
    - balance_quantile
    - channel
    - country
    - currency
    - direction
    - merchant
    - mcc
    - plan
    - service_region
    - symbol
    - type

masking:
  token_mask_probability: 0.15
  event_mask_probability: 0.10
  key_mask_probability: 0.10
  unk_probability: 0.10
  label_smoothing: 0.1

text_encoder:
  enabled: false
  provider: hash
  model_name: null
  output_dim: 384
  max_length: 128
  local_files_only: true
  placeholder_token: "[TEXT]"
  target_fields:
    - description
  text_loss_weight: 1.0

model:
  variant: S
  dropout: 0.1
  attention_backend: auto

pretrain:
  batch_size: 8
  steps: 20
  learning_rate: 0.0003
  adamw_learning_rate: 0.0003
  optimizer: muon_adamw
  precision: bf16
  token_budget: 8192
  use_sharded_store: true
  sharded_store_dir: artifacts/pretrain_store
  rebuild_sharded_store: false
  parquet_compression: zstd
  use_sequence_packing: true
  weight_decay: 0.01
  muon_momentum: 0.95
  output_dir: artifacts/pretrain

finetune:
  batch_size: 8
  steps: 20
  learning_rate: 0.0002
  precision: fp32
  output_dir: artifacts/finetune
  pooling: usr_last
  num_outputs: 1
  task_type: binary
  pretrained_backbone_path: artifacts/pretrain/backbone.pt
  tokenizer_path: artifacts/pretrain/tokenizer.json

lora:
  rank: 8
  alpha: 8
  dropout: 0.0

inference:
  checkpoint_path: artifacts/finetune/classifier.pt
  tokenizer_path: artifacts/finetune/tokenizer.json
  source: synthetic
  input_json: null
  sharded_store_dir: null
  mbd: {}
  task_type: binary
  num_examples: 5
  synthetic_seed: 7
  num_records: 16
  threshold: 0.5
  prediction_output: artifacts/inference/predictions.json

probe:
  backbone_path: artifacts/pretrain/backbone.pt
  tokenizer_path: artifacts/pretrain/tokenizer.json
  source: synthetic
  input_json: null
  sharded_store_dir: null
  mbd: {}
  task_type: binary
  pooling: usr_last
  batch_size: 32
  max_iter: 128
  num_outputs: 1
  synthetic_seed: 11
  num_records: 256
  output_path: artifacts/probe/results.json

benchmark:
  batch_size: 8
  steps: 10
  warmup_steps: 2
  num_records: 128
  backends:
    - auto
    - sdpa
    - manual
  pack_events:
    - true
    - false
  output_path: artifacts/benchmark/results.json
